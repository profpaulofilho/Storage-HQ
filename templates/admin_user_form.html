{% extends 'base.html' %}
{% block title %}Novo admin | {{ app_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm"><div class="card-body p-4">
      <h2 class="h4 mb-4">Adicionar administrador</h2>
      <form method="post" class="vstack gap-3">
        <div><label class="form-label">Usuário</label><input class="form-control" name="username" required></div>
        <div><label class="form-label">Senha</label><input class="form-control" type="password" name="password" minlength="8" required></div>
        <div class="d-flex gap-2"><button class="btn btn-danger">Criar admin</button><a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Cancelar</a></div>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
