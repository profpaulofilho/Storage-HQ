{% extends 'base.html' %}
{% block title %}Login | {{ app_title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <h2 class="h4 mb-4">Entrar</h2>
        <form method="post" class="vstack gap-3">
          <div>
            <label class="form-label">Usuário</label>
            <input class="form-control" name="username" required>
          </div>
          <div>
            <label class="form-label">Senha</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <button class="btn btn-danger">Entrar no painel</button>
        </form>
        <p class="small text-secondary mt-3 mb-0">Defina <code>DEFAULT_ADMIN_USERNAME</code> e <code>DEFAULT_ADMIN_PASSWORD</code> nas variáveis do Render para trocar o acesso inicial.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
